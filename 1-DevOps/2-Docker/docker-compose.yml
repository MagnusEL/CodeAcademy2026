name: codeacademy2026
services:
  app:
    container_name: idempotweet
    image: ghcr.io/magnusel/codeacademy2026:sha-4037695
    ports:
      - "3000:3000"
  postgres:
    container_name: postgresql
    image: postgres:17-alpine
    ports:
      - "5000:5432"
    environment:
      - POSTGRES_USER=codeacademy
      - POSTGRES_PASSWORD=codeacademy
      - POSTGRES_DB=codeacademy
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: