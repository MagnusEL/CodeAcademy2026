name: Continuous Integration
on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      SHOULD_RUN:
        description: 'Whether to run the tests or not'
        required: false
        default: 'true'
        type: string
    secrets:
      SONAR_TOKEN:
        description: 'SonarQube token for authentication'
        required: true
      SONAR_HOST_URL:
        description: 'SonarQube server URL'
        required: true

defaults:
  run:
    working-directory: 1-DevOps/idempotweet

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '22.21.1'
            cache: 'yarn'

        - name: Use CorePack
          run: corepack enable
            
        - name: Install dependencies
          run: yarn install
        
        - name: Run tests
          run: yarn test
        
        - name: Test coverage
          if: ${{ inputs.SHOULD_RUN == 'true' }}
          run: yarn test:coverage

        - name: SonarQube Scan
          uses: SonarSource/sonarqube-scan-action@v6
          with:
            projectBaseDir: 1-DevOps/idempotweet
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}